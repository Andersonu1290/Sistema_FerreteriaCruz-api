# ===============================
# CONFIGURACIÓN DE BASE DE DATOS
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/ferreteriacruz_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Andylian129@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# Muestra las consultas SQL en la consola (muy útil para desarrollo)
spring.jpa.show-sql=true

# Formatea el SQL en la consola para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# Estrategia de generación de tablas: 
# 'validate' comprueba que las tablas en tu MySQL coincidan con tus clases Java sin borrarlas ni alterarlas.
spring.jpa.hibernate.ddl-auto=validate

# Dialecto específico de MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=8089

# JWT settings
# Secret para firmar los tokens. En producción mantenlo fuera del repo y usa un gestor de secretos.
jwt.secret=ReplaceThisSecretWithAStrongRandomValue
# Expiración en milisegundos (1 día = 86400000 ms)
jwt.expiration-ms=86400000

